# H2 — Content-driven vs verbosity-driven evasion
# Is the monitor responding to *coherent wrong reasoning* (Family B) or just to
# *off-topic filler of the same length* (Family C)?
#
# CAS = EEMR(B) − EEMR(C) > 0  ⇒  content-driven  (H2 supported)
# CAS ≈ 0                       ⇒  length/anomaly is what the monitor detects
#
# Cache reuse: B prefills from a previous H1 run are Layer-2 cache hits (free).
# Only C is generated + judged fresh.
#
# Usage:
#   bash scripts/run_datagen.sh experiments/example_h2.yaml --dry-run
#   bash scripts/run_datagen.sh experiments/example_h2.yaml all_datagen
#   bash scripts/run_pipeline.sh experiments/example_h2.yaml

run:
  run_name: h2_deepseek_1.5b
  results_dir: results
  seed: 0

data:
  datasets: [mmlu]
  n_items: 50
  mmlu_subjects: all

subjects: [deepseek-r1-distill-qwen-1.5b]

attacker:
  model: anthropic/claude-haiku-4.5
  prompt_version: v1

hypothesis: H2          # expands to families=[B,C], lengths=[100,700]

attack:
  targets: most_plausible
  samples_per_condition: 1

faithfulness:
  enabled: true
  model: anthropic/claude-haiku-4.5
  prompt_version: v1

monitor:
  enabled: true
  variants: [full_trace]
  models:
    - qwen/qwen-2.5-1.5b-instruct
    - anthropic/claude-haiku-4.5

clean_fpr:  {enabled: true}
metrics:    {enabled: true}
plots:      {enabled: true}

cost:
  dry_run: false
  max_spend_usd: 30
