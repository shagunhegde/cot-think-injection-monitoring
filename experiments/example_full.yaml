# Full sweep — all three hypotheses, subject model sweep, full monitor capability table
# Families: [B, C, D] — covers H1 / H2 / H3 simultaneously.
# Subjects:  DeepSeek 1.5B + Qwen3-4B (scale sweep).
# Monitors:  3-model weak→strong sweep (open + closed).
#
# ⚠  This is the expensive full run. Always do a --dry-run first:
#   bash scripts/run_datagen.sh experiments/example_full.yaml --dry-run
#
# Multi-GPU subject inference (4 shards):
#   for i in 0 1 2 3; do
#     python scripts/run_remote.py experiments/example_full.yaml \
#         --stage subject --shard $i --total-shards 4 &
#   done
#   wait
#   python scripts/run_remote.py experiments/example_full.yaml --stage all_analysis

run:
  run_name: full_sweep
  results_dir: results
  seed: 0

data:
  datasets: [mmlu]
  n_items: 50
  mmlu_subjects: all

subjects:
  - deepseek-r1-distill-qwen-1.5b
  - qwen3-4b

attacker:
  model: anthropic/claude-haiku-4.5
  prompt_version: v1

# No hypothesis preset — set all three families and lengths manually for full coverage.
attack:
  families: [B, C, D]
  lengths:  [100, 300, 700]
  targets: most_plausible
  samples_per_condition: 1

faithfulness:
  enabled: true
  model: anthropic/claude-haiku-4.5
  prompt_version: v1

monitor:
  enabled: true
  variants: [full_trace, answer_only]
  models:
    - qwen/qwen-2.5-0.5b-instruct        # weaker than subject (open, OpenRouter)
    - qwen/qwen-2.5-1.5b-instruct        # scale-matched (open, OpenRouter)
    - openai/gpt-4o-mini                 # mid-tier closed (OpenRouter)
    - anthropic/claude-haiku-4.5         # strong closed (OpenRouter)

clean_fpr:  {enabled: true}
metrics:    {enabled: true}
plots:      {enabled: true}

# Remote GPU preferences (used by scripts/run_remote.py).
remote:
  gpu: RTX3090
  volume_mount: /workspace/cache
  wait_timeout_s: 300

cost:
  dry_run: false
  max_spend_usd: 100
