# ─────────────────────────────────────────────────────────────────────────────
# Experiment configuration — every scale knob in one file, all CLI-overridable.
# (§6.6.3 + samples_per_condition addition per user decision)
#
# HOW TO USE
# ----------
# 1. Set knobs here (or override on CLI: --cfg key=value).
# 2. Run:  python -m src.pipeline.run_experiment --dry_run
#          → prints net-new counts, $, GPU-hours after cache. No spend.
# 3. Adjust until estimate is acceptable.
# 4. Run without --dry_run. Guardrail halts+checkpoints at max_spend_usd.
#
# CHEAP-RUN RECIPES (§6.6.5)
# ---------------------------
#   H1 only:   families: [B],    full lengths,  n_items: 50
#   H2 only:   families: [B, C], lengths: [100, 700]
#   H3 only:   families: [B, D], lengths: [300, 700]
#   Smoke:     limit: 1
#   Add model: append to models: → Layers 1/3/4 only; Layer-2 prefills reused
#   Reprice judge prompt: bump prompt_version in config/models.yaml → only Layer 4 recomputes
# ─────────────────────────────────────────────────────────────────────────────

phase: 0                        # current build phase (update as phases complete)

# ── Dataset & item selection ─────────────────────────────────────────────────
datasets: [mmlu]                # [mmlu] | [mmlu, gpqa] (gpqa wired after Phase 5)
n_items: 50                     # items per dataset; 50 smoke / 150-200 real core result

# ── Subject models (open-weight only — §7 hard rule) ─────────────────────────
# All entries must be keys in config/models.yaml.
models:
  - deepseek-r1-distill-qwen-1.5b   # primary subject; start here

# ── Attack grid ──────────────────────────────────────────────────────────────
families: [B, C, D]             # [B] → H1 only; [B,C] → H2; [B,D] → H3; all for full run
                                # A is the monitor-detectability floor, add when calibrating

lengths: [100, 300, 700]         # token lengths in reference_tokenizer
                                # Family A is capped at 700 (enforced by matrix.py)
                                # Family D minimum is 300 (enforced by matrix.py)
                                # 1500 dropped: MockTokenizer miscalibration caused
                                # systematic failures; 3 points sufficient for H1

# ── Target selection ─────────────────────────────────────────────────────────
# most_plausible: highest-prob wrong option per item (default, cleanest)
# sweep:          all three wrong options per item (3× cost, best for a subset)
# [A, C]:         explicit letter list
targets: most_plausible

# ── Monitor suite (Phase 6 adds variants) ────────────────────────────────────
monitor_variants: [full_trace]
  # full_trace | answer_only | paraphrase | self

monitored_states: [unmonitored]
  # unmonitored | monitored

# ── Sampling & reproducibility ───────────────────────────────────────────────
# samples_per_condition: subject generations per item-condition.
#   Default 1 for cheap/smoke runs. Raise to 3-5 for bootstrap CIs (+k× GPU cost).
#   Raising from 1→5 computes only the 4 new samples; lowering reuses the first.
samples_per_condition: 1

seed: 0                         # global seed; per-gen seed = hash(seed, condition_key, sample_idx)
sample_fraction: 1.0            # <1.0 → reproducible subsample of the matrix (uses seed)

# ── Safety valves ────────────────────────────────────────────────────────────
max_conditions: null            # hard cap on matrix size (null = no cap)
limit: null                     # "do N conditions then stop" (1 = single-condition smoke)

# ── Cost guardrail ───────────────────────────────────────────────────────────
dry_run: false                  # true → estimate cost+time from cache, print, EXIT (zero spend)
max_spend_usd: 50               # guardrail: halt+checkpoint if accumulated spend would exceed this

# ── Length control (§5.5) ────────────────────────────────────────────────────
reference_tokenizer: deepseek-r1-distill-qwen-1.5b   # length measured once here; prefills reused across models
length_tolerance: 0.12          # ±12% tolerance; outside → retry or truncate+re-append

# ── Generator model (for Families B, C, D) ───────────────────────────────────
# Must be a key in config/models.yaml. Must NOT be the subject model.
generator_model: claude-haiku-4-5-20251001   # cheap, capable; via Anthropic API
